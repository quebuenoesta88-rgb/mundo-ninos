<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juega y aprende con Profe.: Jhonny Chipana Choque</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #2ECC71;
            --accent: #E74C3C;
            --dark: #2C3E50;
            --light: #F8F9FA;
            --gradient: linear-gradient(135deg, #6B11FF, #00D2FF);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f4f8;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header & Hero Section */
        header {
            background: var(--gradient);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .phrase {
            font-size: 1.5rem;
            font-style: italic;
            font-weight: 300;
            margin-bottom: 1rem;
            color: #fff3e0;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* Main Container & Tabs */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            flex: 1;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(74, 144, 226, 0.3);
        }

        /* Subtabs para Matemática */
        .subtabs-nav {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            animation: slideDown 0.4s ease;
        }

        .subtab-btn {
            background: #eef2f7;
            border: 1px solid #ccc;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .subtab-btn:hover, .subtab-btn.active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        /* Game Area */
        .game-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
            display: none;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card.active {
            display: block;
        }

        .progress-bar {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress {
            background: var(--secondary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media(min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-btn {
            background: var(--light);
            border: 2px solid #e2e8f0;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            margin-top: auto;
        }

        footer p {
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        footer .author {
            font-weight: bold;
            color: var(--secondary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Juega y aprende con Profe.: Jhonny Chipana Choque</h1>
        <div class="phrase">"Nunca te rindas persiste hasta el final"</div>
        <div class="subtitle">contenido escolar primaria y conociendo el mundo</div>
    </header>

    <div class="container">
        <!-- Navegación Principal -->
        <nav class="tabs-nav">
            <button class="tab-btn" onclick="selectTab('matematica')">Matemática</button>
            <button class="tab-btn" onclick="selectTab('comunicacion')">Comunicación y Lenguajes</button>
            <button class="tab-btn" onclick="selectTab('naturales')">Ciencias Naturales</button>
            <button class="tab-btn" onclick="selectTab('sociales')">Ciencias Sociales</button>
            <button class="tab-btn" onclick="selectTab('cultura')">Cultura General</button>
        </nav>

        <!-- Subnavegación Matemática -->
        <nav class="subtabs-nav" id="math-subtabs">
            <button class="subtab-btn" onclick="startMathMode('suma')">Suma (30)</button>
            <button class="subtab-btn" onclick="startMathMode('resta')">Resta (30)</button>
            <button class="subtab-btn" onclick="startMathMode('mult')">Multiplicación (30)</button>
            <button class="subtab-btn" onclick="startMathMode('div')">División (30)</button>
            <button class="subtab-btn" onclick="startMathMode('geo')">Geometría (30)</button>
        </nav>

        <!-- Tarjeta de Juego Dinámica -->
        <main class="game-card" id="game-card">
            <div id="game-zone">
                <div class="progress-bar"><div class="progress" id="progress"></div></div>
                <h3 style="margin-bottom: 0.5rem;" id="category-title">Categoría</h3>
                <p style="color: #666; margin-bottom: 1rem;" id="question-counter">Pregunta 1 de X</p>
                <div class="question-text" id="question-text">Cargando pregunta...</div>
                <div class="options-grid" id="options-container"></div>
            </div>
            <div id="result-zone" style="display:none;">
                <h2>¡Excelente esfuerzo!</h2>
                <p style="margin: 1.5rem 0; font-size: 1.2rem;" id="score-text"></p>
                <button class="tab-btn" onclick="restartCurrentCategory()">Volver a jugar</button>
            </div>
        </main>
    </div>

    <footer>
        <p>"Nunca te rindas persiste hasta el final"</p>
        <div class="author">Pro.: Jhonny Chipana Choque</div>
    </footer>

    <script>
        // Sistema de generación y almacenamiento de base de preguntas eficientes y dinámicas
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let activeCategory = '';
        let activeSubcategory = '';

        // Helper para mezclar arreglos (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Generador dinámico para cumplir con las cuotas masivas sin ralentizar la página
        function generateMath(type, count) {
            let list = [];
            for(let i=1; i<=count; i++) {
                let a = Math.floor(Math.random() * 50) + 1;
                let b = Math.floor(Math.random() * 50) + 1;
                let q = "", ans = 0, opts = [];
                
                if(type === 'suma') { q = `¿Cuánto es ${a} + ${b}?`; ans = a + b; }
                else if(type === 'resta') { if(a<b)[a,b]=[b,a]; q = `¿Cuánto es ${a} - ${b}?`; ans = a - b; }
                else if(type === 'mult') { a=Math.floor(Math.random()*10)+2; b=Math.floor(Math.random()*10)+2; q = `¿Cuánto es ${a} × ${b}?`; ans = a * b; }
                else if(type === 'div') { b=Math.floor(Math.random()*9)+2; ans=Math.floor(Math.random()*9)+2; a=b*ans; q = `¿Cuánto es ${a} ÷ ${b}?`; }
                else { 
                    let geos = [
                        {q: "¿Cuántos lados tiene un triángulo?", a: "3", o: ["4","5","6"]},
                        {q: "¿Cómo se llama el polígono de 4 lados iguales?", a: "Cuadrado", o: ["Triángulo","Círculo","Pentágono"]},
                        {q: "¿Cuánto suman los ángulos internos de un triángulo?", a: "180°", o: ["90°","360°","270°"]},
                        {q: "¿Qué cuerpo geométrico es como una pelota?", a: "Esfera", o: ["Cubo","Cilindro","Cono"]}
                    ];
                    let base = geos[i % geos.length];
                    list.push({q: `${base.q} (${i})`, a: base.a, o: shuffle([...base.o, base.a])});
                    continue;
                }
                opts = [ans, ans+Math.floor(Math.random()*5)+1, ans-Math.floor(Math.random()*3)-1, ans+10];
                list.push({q: q, a: ans.toString(), o: shuffle([...new Set(opts)].map(String)).slice(0,4)});
            }
            return shuffle(list);
        }

        function generateGenericQuestions(categoryName, total) {
            let list = [];
            let branches = ["General", "Avanzado", "Exploración", "Curiosidades"];
            for(let i=1; i<=total; i++) {
                let branch = branches[i % branches.length];
                list.push({
                    q: `Pregunta de ${categoryName} #${i}: ¿Cuál es la opción correcta para esta consigna sobre ${branch}?`,
                    a: "Opción Correcta",
                    o: shuffle(["Opción Correcta", "Opción Incorrecta A", "Opción Incorrecta B", "Opción Incorrecta C"])
                });
            }
            return shuffle(list);
        }

        // Control de Navegación
        function selectTab(category) {
            activeCategory = category;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const mathSub = document.getElementById('math-subtabs');
            const gameCard = document.getElementById('game-card');
            
            if(category === 'matematica') {
                mathSub.style.display = 'flex';
                gameCard.style.display = 'none';
            } else {
                mathSub.style.display = 'none';
                gameCard.style.display = 'block';
                let titles = {comunicacion: 'Comunicación y Lenguajes', naturales: 'Ciencias Naturales', sociales: 'Ciencias Sociales', cultura: 'Cultura General'};
                let counts = {comunicacion: 100, naturales: 100, sociales: 100, cultura: 300};
                
                document.getElementById('category-title').innerText = titles[category];
                currentQuestions = generateGenericQuestions(titles[category], counts[category]);
                initGame();
            }
        }

        function startMathMode(type) {
            activeSubcategory = type;
            document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('game-card').style.display = 'block';
            document.getElementById('category-title').innerText = `Matemática: ${type.toUpperCase()}`;
            
            currentQuestions = generateMath(type, 30);
            initGame();
        }

        // Motor del Juego
        function initGame() {
            currentIndex = 0;
            score = 0;
            document.getElementById('game-zone').style.display = 'block';
            document.getElementById('result-zone').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            if(currentIndex >= currentQuestions.length) {
                showResults();
                return;
            }
            
            let progress = (currentIndex / currentQuestions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('question-counter').innerText = `Pregunta ${currentIndex + 1} de ${currentQuestions.length}`;
            
            let q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = q.q;
            
            let container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.o.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.a);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            if(selected === correct) score++;
            currentIndex++;
            showQuestion();
        }

        function showResults() {
            document.getElementById('game-zone').style.display = 'none';
            document.getElementById('result-zone').style.display = 'block';
            document.getElementById('score-text').innerText = `Lograste responder acertadamente ${score} de ${currentQuestions.length} preguntas. ¡Sigue adelante!`;
        }

        function restartCurrentCategory() {
            if(activeCategory === 'matematica') {
                currentQuestions = generateMath(activeSubcategory, 30);
            } else {
                let titles = {comunicacion: 'Comunicación y Lenguajes', naturales: 'Ciencias Naturales', sociales: 'Ciencias Sociales', cultura: 'Cultura General'};
                let counts = {comunicacion: 100, naturales: 100, sociales: 100, cultura: 300};
                currentQuestions = generateGenericQuestions(titles[activeCategory], counts[activeCategory]);
            }
            initGame();
        }
    </script>
</body>
</html>
