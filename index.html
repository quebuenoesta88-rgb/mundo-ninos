*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif}
:root{
--c1:#6C3FC5;--c2:#FF6B35;--c3:#00BFA5;--c4:#E91E8C;--c5:#2196F3;
--bg:#f0f4ff;--card:#fff;--text:#1a1a2e;--muted:#666;
--correct:#00C853;--wrong:#FF1744;--shadow:0 4px 20px rgba(0,0,0,0.12);
}
.wrap{background:var(--bg);min-height:100vh;padding:0 0 40px}

/* HEADER */
.header{background:linear-gradient(135deg,#6C3FC5 0%,#E91E8C 50%,#FF6B35 100%);padding:24px 16px 20px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-30px;left:-30px;width:120px;height:120px;background:rgba(255,255,255,0.08);border-radius:50%}
.header::after{content:'';position:absolute;bottom:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.06);border-radius:50%}
.header h1{font-size:clamp(16px,4vw,22px);font-weight:800;color:#fff;line-height:1.3;text-shadow:0 2px 8px rgba(0,0,0,0.3);position:relative;z-index:1}
.header .star{display:inline-block;animation:spin 4s linear infinite;margin:0 4px}
.header .motto{color:rgba(255,255,255,0.95);font-size:13px;font-weight:600;margin-top:8px;font-style:italic;position:relative;z-index:1}
.header .sub{color:rgba(255,255,255,0.75);font-size:11px;margin-top:4px;position:relative;z-index:1}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* FLOATING STARS */
.stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star-dot{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{0%{opacity:0.2;transform:scale(1)}100%{opacity:1;transform:scale(1.5)}}

/* MAIN TABS */
.main-tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:3px solid var(--bg);scrollbar-width:none;-ms-overflow-style:none;box-shadow:var(--shadow)}
.main-tabs::-webkit-scrollbar{display:none}
.mtab{flex:0 0 auto;padding:12px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;transition:all 0.3s;white-space:nowrap;margin-bottom:-3px;display:flex;align-items:center;gap:5px}
.mtab.active{color:var(--c1);border-bottom-color:var(--c1)}
.mtab:hover:not(.active){color:var(--text);background:#f8f8ff}
.tab-icon{font-size:16px}

/* SUB TABS (Math only) */
.sub-tabs{display:flex;overflow-x:auto;background:#f8f0ff;padding:8px 12px;gap:8px;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.stab{flex:0 0 auto;padding:7px 14px;font-size:11px;font-weight:700;border-radius:20px;border:2px solid var(--c1);color:var(--c1);background:#fff;cursor:pointer;transition:all 0.25s;white-space:nowrap}
.stab.active{background:var(--c1);color:#fff}

/* CONTENT */
.tab-content{display:none;padding:16px}
.tab-content.active{display:block;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* QUIZ AREA */
.quiz-box{background:var(--card);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
.quiz-header{padding:16px 20px;background:linear-gradient(135deg,var(--c1),#9C27B0);color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.quiz-title{font-size:15px;font-weight:700}
.quiz-stats{display:flex;gap:12px;font-size:12px;font-weight:600}
.stat-badge{background:rgba(255,255,255,0.25);padding:4px 10px;border-radius:12px}

.progress-bar{height:6px;background:rgba(255,255,255,0.3)}
.progress-fill{height:100%;background:#FFD700;border-radius:0 3px 3px 0;transition:width 0.5s ease}

.question-area{padding:20px}
.q-num{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px}
.q-text{font-size:16px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{padding:12px 16px;border-radius:14px;border:2px solid #e0e0e0;background:#fff;text-align:left;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);transition:all 0.2s;display:flex;align-items:center;gap:10px}
.opt-btn:hover:not(:disabled){border-color:var(--c1);background:#f5f0ff;transform:translateX(4px)}
.opt-btn.correct{border-color:var(--correct);background:#e8f5e9;color:#1b5e20}
.opt-btn.wrong{border-color:var(--wrong);background:#ffebee;color:#b71c1c}
.opt-letter{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.opt-btn.correct .opt-letter{background:var(--correct);color:#fff}
.opt-btn.wrong .opt-letter{background:var(--wrong);color:#fff}

.feedback{padding:12px 16px;border-radius:12px;margin-top:14px;font-size:14px;font-weight:600;display:none;animation:popIn 0.3s ease}
.feedback.show{display:flex;align-items:center;gap:8px}
.feedback.correct{background:#e8f5e9;color:#2e7d32;border-left:4px solid var(--correct)}
.feedback.wrong{background:#ffebee;color:#c62828;border-left:4px solid var(--wrong)}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}

.nav-btns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.nav-btn{flex:1;min-width:100px;padding:11px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-next{background:var(--c1);color:#fff}
.btn-next:hover{background:#5a2fa5;transform:scale(1.02)}
.btn-restart{background:var(--c2);color:#fff}
.btn-restart:hover{background:#e55a25}

/* RESULT */
.result-box{text-align:center;padding:32px 20px}
.result-score{font-size:56px;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-label{font-size:16px;color:var(--muted);margin-top:4px}
.result-stars{font-size:36px;margin:16px 0;animation:bounce 0.5s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.result-msg{font-size:15px;font-weight:600;color:var(--text);margin-bottom:20px}

/* START SCREEN */
.start-box{text-align:center;padding:32px 20px}
.start-icon{font-size:56px;margin-bottom:12px;animation:bounce2 1s ease infinite alternate}
@keyframes bounce2{from{transform:scale(1)}to{transform:scale(1.1)}}
.start-title{font-size:18px;font-weight:800;color:var(--c1);margin-bottom:8px}
.start-info{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.start-btn{background:linear-gradient(135deg,var(--c1),var(--c4));color:#fff;border:none;padding:14px 40px;border-radius:25px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(108,63,197,0.4);transition:all 0.3s}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(108,63,197,0.5)}

/* FOOTER */
.footer{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px}
.footer strong{color:var(--c1);font-size:14px}

/* MATH TABS - different color */
#tab-mat .quiz-header{background:linear-gradient(135deg,#1565C0,#42A5F5)}
#tab-com .quiz-header{background:linear-gradient(135deg,#2E7D32,#66BB6A)}

#tab-cul .quiz-header{background:linear-gradient(135deg,#E65100,#FFA726)}
</style>

// ============================================================
// STATE
// ============================================================
let state = {
  tab: 'mat',
  sub: 'suma',
  current: 0,
  score: 0,
  answered: false,
  order: [],
  started: false
};

// ============================================================
// SHUFFLE
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// GET CURRENT KEY
// ============================================================
function getKey() {
  return state.tab === 'mat' ? state.sub : state.tab;
}

function getQuestions() {
  return QUESTIONS[getKey()] || [];
}

// ============================================================
// TABS
// ============================================================
function showTab(tab) {
  state.tab = tab;
  state.started = false;
  document.querySelectorAll('.main-tabs .mtab').forEach((b,i) => {
    const tabs = ['mat','com','cna','cso','cul'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab !== 'mat') renderStart();
}

function showSub(sub) {
  state.sub = sub;
  state.started = false;
  document.querySelectorAll('.stab').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(sub === 'suma' ? 'Suma' : sub === 'resta' ? 'Resta' : sub === 'multi' ? 'Multi' : sub === 'div' ? 'Divis' : 'Geo'));
  });
  renderStart();
}

// ============================================================
// RENDER START
// ============================================================
function renderStart() {
  const key = getKey();
  const qs = getQuestions();
  const icons = {suma:'➕',resta:'➖',multi:'✖️',div:'➗',geo:'📐',com:'📖',cna:'🌿',cso:'🌍',cul:'🏆'};
  const names = {suma:'Suma',resta:'Resta',multi:'Multiplicación',div:'División',geo:'Geometría',com:'Comunicación y Lenguaje',cna:'Ciencias Naturales',cso:'Ciencias Sociales',cul:'Cultura General'};
  const area = state.tab === 'mat' ? 'quizArea-mat' : 'quizArea-' + state.tab;
  document.getElementById(area).innerHTML = `
    <div class="quiz-box">
      <div class="start-box">
        <div class="start-icon">${icons[key]||'📚'}</div>
        <div class="start-title">${names[key]||key}</div>
        <div class="start-info">${qs.length} preguntas preparadas<br>¡Cada vez en orden diferente!<br>Responde y gana puntos ⭐</div>
        <button class="start-btn" onclick="startQuiz()">¡Empezar a Jugar!</button>
      </div>
    </div>`;
}

// ============================================================
// START QUIZ
// ============================================================
function startQuiz() {
  const qs = getQuestions();
  state.order = shuffle(qs.map((_,i)=>i));
  state.current = 0;
  state.score = 0;
  state.answered = false;
  state.started = true;
  renderQuestion();
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion() {
  const qs = getQuestions();
  const idx = state.order[state.current];
  const q = qs[idx];
  const total = qs.length;
  const pct = ((state.current) / total * 100).toFixed(0);
  const area = state.tab === 'mat' ? 'quizArea-mat' : 'quizArea-' + state.tab;
  const opts = q.o.map((o,i) => `
    <button class="opt-btn" id="opt${i}" onclick="checkAnswer(${i},${q.a})">
      <span class="opt-letter">${'ABCD'[i]}</span>${o}
    </button>`).join('');
  document.getElementById(area).innerHTML = `
    <div class="quiz-box" id="tab-${state.tab}">
      <div class="quiz-header">
        <span class="quiz-title">Pregunta ${state.current+1} de ${total}</span>
        <div class="quiz-stats">
          <span class="stat-badge">✅ ${state.score}</span>
          <span class="stat-badge">❌ ${state.current - state.score}</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question-area">
        <div class="q-num">Pregunta ${state.current+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${opts}</div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>`;
}

// ============================================================
// CHECK ANSWER
// ============================================================
function checkAnswer(chosen, correct) {
  if (state.answered) return;
  state.answered = true;
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen && chosen !== correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    state.score++;
    fb.textContent = '🎉 ¡Correcto! ¡Muy bien!';
    fb.className = 'feedback correct show';
  } else {
    fb.textContent = `😅 Incorrecto. La respuesta era: ${QUESTIONS[getKey()][state.order[state.current]].o[correct]}`;
    fb.className = 'feedback wrong show';
  }
  const nav = document.createElement('div');
  nav.className = 'nav-btns';
  const qs = getQuestions();
  if (state.current + 1 < qs.length) {
    nav.innerHTML = `<button class="nav-btn btn-next" onclick="nextQuestion()">Siguiente ▶</button>`;
  } else {
    nav.innerHTML = `<button class="nav-btn btn-restart" onclick="showResult()">Ver Resultado 🏆</button>`;
  }
  document.querySelector('.question-area').appendChild(nav);
  state.answered = false;
}

// ============================================================
// NEXT QUESTION
// ============================================================
function nextQuestion() {
  state.current++;
  state.answered = false;
  renderQuestion();
}

// ============================================================
// SHOW RESULT
// ============================================================
function showResult() {
  const total = getQuestions().length;
  const pct = Math.round((state.score / total) * 100);
  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : '⭐';
  const msg = pct >= 90 ? '¡Excelente! ¡Eres un genio!' : pct >= 70 ? '¡Muy bien! ¡Sigue adelante!' : pct >= 50 ? '¡Buen intento! ¡Practica más!' : '¡No te rindas! ¡Inténtalo de nuevo!';
  const area = state.tab === 'mat' ? 'quizArea-mat' : 'quizArea-' + state.tab;
  document.getElementById(area).innerHTML = `
    <div class="quiz-box">
      <div class="result-box">
        <div class="result-stars">${stars}</div>
        <div class="result-score">${state.score}/${total}</div>
        <div class="result-label">${pct}% de aciertos</div>
        <div class="result-msg" style="margin-top:12px">${msg}</div>
        <div style="margin-top:8px;font-size:13px;color:#999">Profe: Jhonny Chipana Choque</div>
        <button class="nav-btn btn-restart" style="margin-top:24px;width:100%;max-width:280px" onclick="startQuiz()">🔄 Jugar de Nuevo</button>
      </div>
    </div>`;
}

// ============================================================
// STARS ANIMATION
// ============================================================
const sc = document.getElementById('starsContainer');
for(let i=0;i<15;i++){
  const s = document.createElement('div');
  s.className='star-dot';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  s.style.animationDuration=(1+Math.random()*2)+'s';
  sc.appendChild(s);
}

// ============================================================
// INIT
// ============================================================
state.sub = 'suma';
renderStart();
</script>
