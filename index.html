<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo Mundo Niños</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e6f7ff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .portal-header {
            text-align: center;
            color: #0077b6;
            margin-bottom: 20px;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-materias { background-color: #f77f00; }
        .btn-juegos { background-color: #00b4d8; }
        .btn-actividades { background-color: #7cb518; }
        
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 550px;
            text-align: center;
            border: 3px solid #00b4d8;
        }
        .question-display {
            background-color: #caf0f8;
            color: #03045e;
            font-size: 2rem;
            font-weight: bold;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }
        .option-button:hover { background-color: #f77f00; }
    </style>
</head>
<body>

    <div class="portal-header">
        <h1>🌍 Portal Educativo Mundo Niños</h1>
        <p>¡Tu espacio interactivo para aprender, cantar y jugar!</p>
    </div>

    <div class="nav-buttons">
        <button class="btn btn-materias">📚 Materias</button>
        <button class="btn btn-juegos">🕹️ Juegos</button>
        <button class="btn btn-actividades">📝 Actividades</button>
    </div>

    <div class="game-card">
        <h2 style="color: #f77f00;">🔢 Juego: JhoTeRetaMat</h2>
        <div class="question-display" id="questionBox">Cargando reto...</div>
        
        <div class="options-grid">
            <button class="option-button" onclick="verify(0)" id="btn0">-</button>
            <button class="option-button" onclick="verify(1)" id="btn1">-</button>
            <button class="option-button" onclick="verify(2)" id="btn2">-</button>
            <button class="option-button" onclick="verify(3)" id="btn3">-</button>
        </div>
        <p>Pregunta: <span id="progress">1</span> de 100</p>
    </div>

    <script>
        const mathModule = [
            { question: "¿Cuánto es 8 + 5?", options: ["11", "13", "12", "14"], correct: "13" },
            { question: "¿Cuánto es 15 - 7?", options: ["6", "8", "7", "9"], correct: "8" },
            { question: "¿Cuánto es 6 x 3?", options: ["16", "18", "15", "20"], correct: "18" }
        ];

        let index = 0;

        function render() {
            if (index >= mathModule.length) {
                document.getElementById('questionBox').innerText = "🎉 ¡Completado!";
                return;
            }
            document.getElementById('questionBox').innerText = mathModule[index].question;
            document.getElementById('progress').innerText = index + 1;
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).innerText = mathModule[index].options[i];
            }
        }

        function verify(chosen) {
            if (mathModule[index].options[chosen] === mathModule[index].correct) {
                alert("¡Correcto! 🎯");
            }
            index++;
            render();
        }

        window.onload = render;
    </script>
</body>
</html>
